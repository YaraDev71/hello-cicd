version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/hello-cicd
hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 900
      runas: root
  AfterInstall:
    - location: scripts/build_and_deploy.sh
      timeout: 900
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: root
